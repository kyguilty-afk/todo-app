name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # mainブランチへのpushで自動デプロイ

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存パッケージをインストール
        run: npm install

      - name: プロダクションビルドを実行
        run: npm run build

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
